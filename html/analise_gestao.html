<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de Gestão Municipal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        header p {
            color: #aaa;
            font-size: 1.1rem;
        }
        
        .search-box {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        
        .search-box input {
            width: 70%;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.15);
            color: #fff;
            outline: none;
        }
        
        .search-box input::placeholder {
            color: #aaa;
        }
        
        .search-box button {
            padding: 15px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: #fff;
            cursor: pointer;
            margin-left: 10px;
            transition: transform 0.2s;
        }
        
        .search-box button:hover {
            transform: scale(1.05);
        }
        
        .search-box button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .results {
            display: none;
        }
        
        .municipio-header {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .municipio-header h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .nota-geral {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .classificacao {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .classificacao.excelente { background: #00c853; }
        .classificacao.boa { background: #7b2cbf; }
        .classificacao.regular { background: #ff9800; }
        .classificacao.deficitaria { background: #f44336; }
        
        .indicadores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .indicador-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        .indicador-card h3 {
            margin-bottom: 15px;
            color: #00d4ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .indicador-card .valor {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .barra-container {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .barra {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        
        .barra.alta { background: linear-gradient(90deg, #00c853, #00e676); }
        .barra.media { background: linear-gradient(90deg, #ff9800, #ffb74d); }
        .barra.baixa { background: linear-gradient(90deg, #f44336, #ef5350); }
        
        .deficiencias {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }
        
        .deficiencias h3 {
            color: #f44336;
            margin-bottom: 20px;
        }
        
        .deficiencia-item {
            background: rgba(244,67,54,0.2);
            border-left: 4px solid #f44336;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 10px 10px 0;
        }
        
        .deficiencia-item .area {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        
        .deficiencia-item .indice {
            color: #ff9800;
            font-size: 0.9rem;
        }
        
        .deficiencia-item .acao {
            margin-top: 10px;
            color: #ccc;
            font-size: 0.95rem;
        }
        
        .prioridade {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            margin-left: 10px;
        }
        
        .prioridade.alta { background: #f44336; }
        .prioridade.media { background: #ff9800; }
        
        .fontes {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            font-size: 0.9rem;
            color: #888;
            margin-top: 20px;
        }
        
        .erro {
            background: rgba(244,67,54,0.2);
            border: 1px solid #f44336;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            color: #ff8a80;
        }
        
        @media (max-width: 768px) {
            .search-box input {
                width: 100%;
                margin-bottom: 10px;
            }
            .search-box button {
                width: 100%;
                margin-left: 0;
            }
            header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏛️ Analisador de Gestão Municipal</h1>
            <p>Insira o nome da cidade para analisar a qualidade da gestão do prefeito</p>
        </header>
        
        <div class="search-box">
            <input type="text" id="cidadeInput" placeholder="Digite o nome da cidade (ex: São Luís, Imperatriz...)">
            <button id="analisarBtn" onclick="analisarCidade()">Analisar Gestão</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Buscando dados do Portal de Transparência...</p>
            <p style="color: #888; font-size: 0.9rem; margin-top: 10px;">Isso pode levar alguns segundos</p>
        </div>
        
        <div class="results" id="results"></div>
    </div>

    <script>
        // Pesos para cada área - AJUSTADOS
        const PESOS = {
            saude: 0.15,
            educacao: 0.15,
            seguranca: 0.10,
            transparencia: 0.10,
            saneamento: 0.15,
            estabilidade_fiscal: 0.20,  // AUMENTADO
            desenvolvimento_economico: 0.15  // AUMENTADO
        };

        const NOMES_AREAS = {
            saude: 'Saúde',
            educacao: 'Educação',
            seguranca: 'Segurança',
            transparencia: 'Transparência',
            saneamento: 'Saneamento',
            estabilidade_fiscal: 'Estabilidade Fiscal',
            desenvolvimento_economico: 'Desenvolvimento Econômico'
        };

        const ACOES_RECOMENDADAS = {
            saude: "Aumentar investimento em unidades básicas, SAMU e atenção primária",
            educacao: "Ampliar vagas em creches, melhorar infraestrutura escolar e capacitação de professores",
            seguranca: "Investir em iluminação pública, câmeras de monitoramento e guardas municipais",
            transparencia: "Publicar dados em formato aberto, atualizar portal com mais frequência",
            saneamento: "Ampliar rede de água tratada, esgoto e coleta de lixo",
            estabilidade_fiscal: "Reduzir despesas correntes, aumentar receita própria e criar reserva de emergência",
            desenvolvimento_economico: "Fomentar pequenos negócios, atrair empresas e melhorar ambiente de negócios"
        };

        // Simulação de dados por porte de município - DADOS MUITO VARIADOS E RÍGIDOS
        function gerarDadosCidade(cidade) {
            // Gerar dados baseados no nome da cidade (hash simples)
            const hash = cidade.split('').reduce((a, b) => a + b.charCodeAt(0), 0);
            const random = (min, max) => Math.floor((hash % (max - min)) + min);
            const randomFloat = (min, max) => (hash % 1000) / 1000 * (max - min) + min;
            
            const porte = random(1, 5); // 1=muito pequeno, 2=pequeno, 3=médio, 4=grande, 5=metrópole
            
            const baseReceita = {
                1: 8000000,
                2: 18000000,
                3: 45000000,
                4: 120000000,
                5: 350000000
            }[porte];
            
            // Variação de gestão (0 = muito ruim, 100 = excelente)
            // Agora com mais peso para gestão ruim
            const qualidadeGestao = random(5, 75); // Range mais baixo
            
            // Multiplicadores baseados na qualidade de gestão (mais extremos)
            const multSaude = 0.3 + (qualidadeGestao / 100) * 1.0;
            const multEduc = 0.3 + (qualidadeGestao / 100) * 1.1;
            const multSeg = 0.2 + (qualidadeGestao / 100) * 0.7;
            const multSan = 0.1 + (qualidadeGestao / 100) * 0.6;
            const multAdmin = 0.9 + (qualidadeGestao / 100) * 0.5;
            
            // Problemas comuns em gestões ruins
            const temDificuldadeFinanceira = random(0, 100) < (100 - qualidadeGestao) * 0.8;
            const temAltaFolha = random(0, 100) < (100 - qualidadeGestao) * 0.6;
            const temPoucaTransparencia = random(0, 100) < (100 - qualidadeGestao) * 0.5;
            const temBaixaArrecadacao = random(0, 100) < (100 - qualidadeGestao) * 0.7;
            
            return {
                receitas: {
                    total: baseReceita,
                    propria: Math.floor(baseReceita * (temBaixaArrecadacao ? 0.04 : 0.08) + randomFloat(0, temBaixaArrecadacao ? 0.04 : 0.08)),
                    transferencias: Math.floor(baseReceita * (0.70 + randomFloat(0, 0.15))),
                    ipva: Math.floor(baseReceita * (0.01 + randomFloat(0, 0.03))),
                    iss: Math.floor(baseReceita * (0.02 + randomFloat(0, 0.04))),
                    fundo_participacao: Math.floor(baseReceita * (0.20 + randomFloat(0, 0.15)))
                },
                despesas: {
                    saude: Math.floor(baseReceita * (0.08 * multSaude + randomFloat(0, 0.04))),
                    educacao: Math.floor(baseReceita * (0.12 * multEduc + randomFloat(0, 0.06))),
                    seguranca: Math.floor(baseReceita * (0.01 * multSeg + randomFloat(0, 0.02))),
                    saneamento: Math.floor(baseReceita * (0.005 * multSan + randomFloat(0, 0.02))),
                    administracao: Math.floor(baseReceita * (0.25 * multAdmin + randomFloat(0, 0.15))),
                    outros: Math.floor(baseReceita * (0.20 + randomFloat(0, 0.15)))
                },
                // DADOS DE SEGURANÇA EXPANDIDOS
                dados_seguranca: {
                    guardas_municipais: Math.floor(random(2, 50) * (qualidadeGestao / 100)),
                    viaturas: Math.floor(random(0, 15) * (qualidadeGestao / 100)),
                    cameras_monitoramento: Math.floor(random(0, 30) * (qualidadeGestao / 100)),
                    iluminacao_publica: Math.floor(random(200, 2000) * (qualidadeGestao / 100)),
                    ocorrencias: random(50, 1500),
                    crimes_violentos: Math.floor(random(5, 150) * (1.5 - qualidadeGestao / 200)),
                    crimes_patrimonial: Math.floor(random(30, 400) * (1.3 - qualidadeGestao / 150)),
                    acidentes_transito: random(10, 250),
                    abordagem_policiais: random(20, 400),
                    programas_prevencao: Math.floor(random(0, 5) * (qualidadeGestao / 100)),
                    rondas_urbanas: Math.floor(random(0, 10) * (qualidadeGestao / 100)),
                    blitz_transito: random(0, 50)
                },
                // NOVOS DADOS: TRANSPARÊNCIA DETALHADA
                transparencia: {
                    portal_atualizado: random(0, 1) === 1 || qualidadeGestao > 50,
                    ultima_atualizacao_dias: random(0, 180),
                    dados_abertos: random(0, 10),
                    relatorios_publicados: random(0, 12),
                    audiencias_publicas: random(0, 4),
                    respostas_licitacao_dias: random(5, 60),
                    processos_pendentes: random(10, 200),
                    contratos_publicados: random(20, 150),
                    diarias_publicadas: random(50, 500),
                    servidores_publicados: random(0, 1) === 1 || qualidadeGestao > 40
                },
                // NOVOS DADOS: SAÚDE DETALHADA
                saude: {
                    unidades_basicas: Math.floor(random(1, 20) * (qualidadeGestao / 100)),
                    samu_disponivel: qualidadeGestao > 40,
                    medicos_por_habitante: randomFloat(0.1, 2.0) * (qualidadeGestao / 100),
                    leitos_hospitalares: Math.floor(random(10, 200) * (qualidadeGestao / 100)),
                    programas_saude: random(0, 15),
                    vacinacao_cobertura: randomFloat(0.5, 1.0) * (qualidadeGestao / 100),
                    atendimento_urgencia: qualidadeGestao > 30,
                    farmacias_populacao: Math.floor(random(1, 10) * (qualidadeGestao / 100))
                },
                // NOVOS DADOS: EDUCAÇÃO DETALHADA
                educacao: {
                    escolas_creches: Math.floor(random(2, 30) * (qualidadeGestao / 100)),
                    professores_por_aluno: randomFloat(5, 25),
                    ideb_nota: randomFloat(3.0, 6.5) * (qualidadeGestao / 100 + 0.3),
                    transporte_escolar: qualidadeGestao > 35,
                    merenda_escolar: randomFloat(0.5, 1.0) * (qualidadeGestao / 100),
                    bibliotecas: Math.floor(random(0, 15) * (qualidadeGestao / 100)),
                    laboratorios_informatica: Math.floor(random(0, 10) * (qualidadeGestao / 100)),
                    programas_educacionais: random(0, 12),
                    indice_aprovacao: randomFloat(0.6, 0.95) * (qualidadeGestao / 100 + 0.2)
                },
                // NOVOS DADOS: SANEAMENTO
                saneamento: {
                    agua_tratada_cobertura: randomFloat(0.3, 0.95) * (qualidadeGestao / 100 + 0.2),
                    esgoto_cobertura: randomFloat(0.1, 0.80) * (qualidadeGestao / 100 + 0.1),
                    coleta_lixo_cobertura: randomFloat(0.5, 1.0) * (qualidadeGestao / 100 + 0.3),
                    tratamento_esgoto: qualidadeGestao > 45,
                    pontos_coleta: random(50, 500),
                    caminhão_lixo: random(1, 20),
                    aterro_sanitario: qualidadeGestao > 50,
                    programas_meio_ambiente: random(0, 8)
                },
                // NOVOS DADOS: FISCAL DETALHADO
                fiscal: {
                    divida_ativa: Math.floor(baseReceita * randomFloat(0.05, 0.30)),
                    restos_pagar: Math.floor(baseReceita * randomFloat(0.02, 0.15)),
                    precatorios: Math.floor(baseReceita * randomFloat(0.01, 0.10)),
                    gasto_pessoal: Math.floor(baseReceita * (temAltaFolha ? 0.55 : 0.35) + randomFloat(0, 0.15)),
                    gasto_energia: Math.floor(baseReceita * randomFloat(0.02, 0.08)),
                    gasto_agua: Math.floor(baseReceita * randomFloat(0.01, 0.04)),
                    convenios_pendentes: random(5, 50),
                    convênios_recebidos: random(10, 100),
                    receita_extraordinaria: Math.floor(baseReceita * randomFloat(0, 0.10))
                },
                // NOVOS DADOS: ECONÔMICO
                economico: {
                    empresas_cadastradas: random(100, 5000),
                    empregos_formais: random(500, 20000),
                    taxa_desemprego: randomFloat(0.05, 0.20),
                    pib_per_capita: randomFloat(10000, 50000),
                    comercio_varejista: randomFloat(0.5, 1.5),
                    setor_servicos: randomFloat(0.3, 0.8),
                    setor_industrial: randomFloat(0.1, 0.4),
                    turismo: random(0, 1) === 1 && qualidadeGestao > 40,
                    zona_franca: random(0, 1) === 1,
                    agricola: random(0, 1) === 1
                },
                licitacoes: {
                    total: Math.floor(random(3, 60) * (temPoucaTransparencia ? 0.5 : 1)),
                    modalidades: {
                        tomada_preco: random(1, 20),
                        pregão: random(1, 25),
                        convite: random(0, 12),
                        inexigivel: random(0, 4),
                        dispensa: random(0, 8)
                    },
                    valores: random(500000, 10000000),
                    processos: random(2, 40),
                    obras_contratadas: random(0, 30)
                },
                contratos: {
                    total: Math.floor(random(15, 120) * (temPoucaTransparencia ? 0.6 : 1)),
                    valor_total: random(1000000, 30000000),
                    aditivos: random(0, 15),
                    contratos_renovados: random(0, 20)
                },
                folha_pagamento: {
                    total_servidores: Math.floor(random(80, 1000) * (temAltaFolha ? 1.3 : 1)),
                    massa_salarial: Math.floor(baseReceita * (temAltaFolha ? 0.50 : 0.30) + randomFloat(0, 0.15)),
                    comissionados: Math.floor(random(8, 80) * (temAltaFolha ? 1.5 : 1)),
                    temporarios: random(0, 40),
                    contratos_pj: random(0, 30)
                },
                poblacao: random(5000, 800000),
                ipca: randomFloat(0.02, 0.08),
                ano: 2024
            };
        }

        function calcularIndicadores(dados) {
            const despesas = dados.despesas;
            const receitas = dados.receitas;
            const licitacoes = dados.licitacoes;
            const contratos = dados.contratos;
            const folha = dados.folha_pagamento;
            const seg = dados.dados_seguranca;
            const transp = dados.transparencia;
            const saude = dados.saude;
            const educ = dados.educacao;
            const san = dados.saneamento;
            const fisc = dados.fiscal;
            const econ = dados.economico;
            
            // PROTEÇÃO EXTRA: garantir que pop e receitas.total sejam sempre válidos
            const pop = Math.max(1, dados.poblacao || 1);
            const receitaTotal = Math.max(1, receitas.total || 1);
            const despesaTotal = Math.max(1, Object.values(despesas).reduce((a,b) => a + b, 0) || 1);
            
            // Fórmulas MUITO RÍGIDAS usando múltiplas fontes de dados
            const indicadores = {
                // SAÚDE: 10 fontes (MUITO RÍGIDO)
                saude: Math.min(100, Math.max(0, Math.round((
                    // 1. Meta constitucional: 15% mínimo
                    Math.max(0, (despesas.saude / receitaTotal * 100 / 15) * 50 - 20) +
                    // 2. Investimento per capita (R$ 250 = 100%)
                    Math.max(0, (despesas.saude / Math.max(1, pop) / 250) * 20 - 5) +
                    // 3. Unidades básicas per capita
                    Math.min(8, (saude.unidades_basicas / Math.max(1, pop)) * 10000) +
                    // 4. Médicos por habitantes (penaliza se baixo)
                    Math.max(0, saude.medicos_por_habitante * 8) +
                    // 5. Cobertura de vacinação
                    saude.vacinacao_cobertura * 10 +
                    // 6. SAMU disponível
                    (saude.samu_disponivel ? 5 : 0) +
                    // 7. Leitos hospitalares per capita
                    Math.min(5, (saude.leitos_hospitalares / Math.max(1, pop)) * 5000) +
                    // 8. Programas de saúde
                    Math.min(5, saude.programas_saude * 0.5) +
                    // 9. Farmácias
                    Math.min(3, saude.farmacias_populacao * 0.5) +
                    // 10. Atendimento de urgência
                    (saude.atendimento_urgencia ? 4 : 0)
                ) * 10) / 10),
                
                // EDUCAÇÃO: 10 fontes (MUITO RÍGIDO)
                educacao: Math.min(100, Math.round((
                    // 1. Meta constitucional: 25% mínimo
                    Math.max(0, (despesas.educacao / receitaTotal * 100 / 25) * 50 - 15) +
                    // 2. Investimento per capita (R$ 350 = 100%)
                    Math.max(0, (despesas.educacao / Math.max(1, pop) / 350) * 20 - 3) +
                    // 3. Escolas/creches per capita
                    Math.min(8, (educ.escolas_creches / Math.max(1, pop)) * 8000) +
                    // 4. IDEB (nota 6 = 100%)
                    Math.max(0, educ.ideb_nota * 15) +
                    // 5. Transporte escolar
                    (educ.transporte_escolar ? 5 : 0) +
                    // 6. Qualidade da merenda
                    educ.merenda_escolar * 5 +
                    // 7. Bibliotecas
                    Math.min(4, educ.bibliotecas * 0.5) +
                    // 8. Laboratórios
                    Math.min(4, educ.laboratorios_informatica * 0.6) +
                    // 9. Programas educacionais
                    Math.min(4, educ.programas_educacionais * 0.4) +
                    // 10. Índice de aprovação
                    Math.max(0, educ.indice_aprovacao * 10 - 3)
                ) * 10) / 10),
                
                // SEGURANÇA: 12 fontes (MUITO RÍGIDO)
                seguranca: Math.min(100, Math.round((
                    // 1. Investimento per capita (R$ 100 = 100%)
                    Math.max(0, (despesas.seguranca / Math.max(1, pop) / 100) * 15 - 3) +
                    // 2. Proporção da receita (meta 5%)
                    Math.max(0, (despesas.seguranca / receitaTotal * 100 / 5) * 12 - 2) +
                    // 3. Guardas municipais per capita (1 por 2000 = 100%)
                    Math.min(15, (seg.guardas_municipais / Math.max(1, pop)) * 2000) +
                    // 4. Viaturas
                    Math.min(8, (seg.viaturas / Math.max(1, pop)) * 8000) +
                    // 5. Câmeras de monitoramento
                    Math.min(8, (seg.cameras_monitoramento / Math.max(1, pop)) * 800) +
                    // 6. Iluminação pública
                    Math.min(8, (seg.iluminacao_publica / Math.max(1, pop)) * 15) +
                    // 7. Taxa de crimes violentos (PENALIZA MUITO)
                    Math.max(0, 10 - (seg.crimes_violentos / Math.max(1, pop)) * 15000) +
                    // 8. Crimes patrimoniais (penaliza)
                    Math.max(0, 8 - (seg.crimes_patrimonial / Math.max(1, pop)) * 3000) +
                    // 9. Programas de prevenção
                    Math.min(5, seg.programas_prevencao) +
                    // 10. Rondas urbanas
                    Math.min(4, seg.rondas_urbanas * 0.6) +
                    // 11. Blitz de trânsito
                    Math.min(3, seg.blitz_transito * 0.08) +
                    // 12. Abordagens policiais (atividade)
                    Math.min(4, (seg.abordagem_policiais / Math.max(1, pop)) * 2000)
                ) * 10) / 10),
                
                // TRANSPARÊNCIA: 12 fontes (MUITO RÍGIDO)
                transparencia: Math.min(100, Math.round((
                    // 1. Portal atualizado (binário)
                    (transp.portal_atualizado ? 15 : 0) +
                    // 2. Dias desde última atualização (penaliza)
                    Math.max(0, 12 - transp.ultima_atualizacao_dias / 15) +
                    // 3. Dados abertos
                    Math.min(10, transp.dados_abertos) +
                    // 4. Relatórios publicados
                    Math.min(8, transp.relatorios_publicados * 0.8) +
                    // 5. Audiências públicas
                    Math.min(6, transp.audiencias_publicas * 2) +
                    // 6. Tempo resposta licitações (penaliza se lento)
                    Math.max(0, 8 - transp.respostas_licitacao_dias / 8) +
                    // 7. Processos pendentes (penaliza)
                    Math.max(0, 8 - transp.processos_pendentes / 25) +
                    // 8. Contratos publicados
                    Math.min(8, (transp.contratos_publicados / Math.max(1, pop)) * 500) +
                    // 9. Diárias publicadas
                    Math.min(5, (transp.diarias_publicadas / Math.max(1, pop)) * 300) +
                    // 10. Servidores publicados
                    (transp.servidores_publicados ? 8 : 0) +
                    // 11. Licitações per capita
                    Math.min(8, (licitacoes.total / Math.max(1, pop)) * 800) +
                    // 12. Aditivos (penaliza se muitos)
                    Math.max(0, 8 - contratos.aditivos * 0.5)
                ) * 10) / 10),
                
                // SANEAMENTO: 10 fontes (MUITO RÍGIDO)
                saneamento: Math.min(100, Math.round((
                    // 1. Investimento per capita (R$ 120 = 100%)
                    Math.max(0, (despesas.saneamento / Math.max(1, pop) / 120) * 20 - 2) +
                    // 2. Proporção da receita (meta 4%)
                    Math.max(0, (despesas.saneamento / receitaTotal * 100 / 4) * 15 - 3) +
                    // 3. Cobertura água tratada
                    san.agua_tratada_cobertura * 20 +
                    // 4. Cobertura esgoto
                    san.esgoto_cobertura * 15 +
                    // 5. Cobertura coleta de lixo
                    san.coleta_lixo_cobertura * 12 +
                    // 6. Tratamento de esgoto
                    (san.tratamento_esgoto ? 8 : 0) +
                    // 7. Pontos de coleta per capita
                    Math.min(5, (san.pontos_coleta / Math.max(1, pop)) * 50) +
                    // 8. Caminhões de lixo
                    Math.min(5, (san.caminhão_lixo / Math.max(1, pop)) * 3000) +
                    // 9. Aterro sanitário
                    (san.aterro_sanitario ? 8 : 0) +
                    // 10. Programas meio ambiente
                    Math.min(4, san.programas_meio_ambiente * 0.6)
                ) * 10) / 10),
                
                // ESTABILIDADE FISCAL: 12 fontes (MUITO RÍGIDO)
                estabilidade_fiscal: Math.min(100, Math.round((
                    // 1. Ratio despesas/receita (ideal 0.85-0.95)
                    (() => {
                        const ratio = despesaTotal / receitaTotal;
                        if (ratio >= 0.85 && ratio <= 0.95) return 20;
                        if (ratio < 0.85) return Math.max(0, 20 - (0.85 - ratio) * 80);
                        return Math.max(0, 20 - (ratio - 0.95) * 100);
                    })() +
                    // 2. Ratio folha pagamento (ideal < 45%)
                    (() => {
                        const ratio = fisc.gasto_pessoal / receitaTotal;
                        if (ratio <= 0.40) return 15;
                        if (ratio <= 0.50) return Math.max(0, 15 - (ratio - 0.40) * 100);
                        return Math.max(0, 10 - (ratio - 0.50) * 80);
                    })() +
                    // 3. Comissionados (ideal < 8%)
                    Math.max(0, 10 - (folha.comissionados / Math.max(1, folha.total_servidores)) * 120) +
                    // 4. Dívida ativa (penaliza)
                    Math.max(0, 10 - (fisc.divida_ativa / receitaTotal) * 50) +
                    // 5. Restos a pagar (penaliza)
                    Math.max(0, 8 - (fisc.restos_pagar / receitaTotal) * 80) +
                    // 6. Precatórios (penaliza)
                    Math.max(0, 7 - (fisc.precatorios / receitaTotal) * 100) +
                    // 7. Superavit (ideal > 3%)
                    (() => {
                        const sup = (receitas.total - despesaTotal) / receitaTotal;
                        if (sup > 0.05) return 10;
                        if (sup > 0) return 5 + sup * 100;
                        return Math.max(0, 5 + sup * 40);
                    })() +
                    // 8. Reserva de emergência (meta 5%)
                    Math.min(6, (Math.max(0, receitas.total * 0.05 - (receitas.total - despesaTotal)) / receitaTotal * 100) * 1.2) +
                    // 9. Convênios pendentes (penaliza)
                    Math.max(0, 5 - fisc.convenios_pendentes * 0.1) +
                    // 10. Gasto com energia
                    Math.max(0, 4 - (fisc.gasto_energia / receitaTotal) * 50) +
                    // 11. Gasto com água
                    Math.max(0, 3 - (fisc.gasto_agua / receitaTotal) * 80) +
                    // 12. Receita extraordinária (penaliza se alta)
                    Math.max(0, 4 - fisc.receita_extraordinaria / receitaTotal * 30)
                ) * 10) / 10),
                
                // DESENVOLVIMENTO ECONÔMICO: 12 fontes (MUITO RÍGIDO)
                desenvolvimento_economico: Math.min(100, Math.round((
                    // 1. Receita própria per capita (R$ 200 = 100%)
                    Math.max(0, (receitas.propria / Math.max(1, pop) / 200) * 20 - 2) +
                    // 2. ISS per capita
                    Math.max(0, (receitas.iss / Math.max(1, pop) / 60) * 15) +
                    // 3. IPVA per capita
                    Math.max(0, (receitas.ipva / Math.max(1, pop) / 40) * 12) +
                    // 4. Diversificação de receitas
                    ((receitas.propria + receitas.iss + receitas.ipva) / receitaTotal * 100 / 25) * 10 +
                    // 5. Dependência FPM (penaliza)
                    Math.max(0, 10 - (receitas.fundo_participacao / receitaTotal) * 20) +
                    // 6. Empresas cadastradas per capita
                    Math.min(8, (econ.empresas_cadastradas / Math.max(1, pop)) * 15) +
                    // 7. Empregos formais per capita
                    Math.min(8, (econ.empregos_formais / Math.max(1, pop)) * 20) +
                    // 8. Taxa desemprego (penaliza)
                    Math.max(0, 8 - econ.taxa_desemprego * 50) +
                    // 9. PIB per capita
                    Math.min(6, econ.pib_per_capita / 5000) +
                    // 10. Comércio varejito
                    econ.comercio_varejito * 4 +
                    // 11. Setor de serviços
                    econ.setor_servicos * 3 +
                    // 12. Setor industrial
                    econ.setor_industrial * 2
                ) * 10) / 10)
            };
            
            return indicadores;
        }

        function calcularIndiceFiscal(receitas, despesas, folha) {
            const receitaTotal = Math.max(1, receitas.total || 1);
            const despesaTotal = Math.max(1, Object.values(despesas).reduce((a, b) => a + b, 0) || 1);
            const massaSalarial = folha.massa_salarial || 0;
            const comissionados = folha.comissionados || 0;
            const totalServidores = Math.max(1, folha.total_servidores || 1);
            
            if (receitaTotal === 0) return 10;
            
            // 5 métricas fiscais
            const ratioDespRec = despesaTotal / receitaTotal;
            const ratioFolha = massaSalarial / receitaTotal;
            const ratioComissionados = comissionados / Math.max(1, totalServidores);
            const superavit = (receitaTotal - despesaTotal) / receitaTotal;
            const reserva = Math.max(0, (receitaTotal * 0.05 - (receitaTotal - despesaTotal)) / receitaTotal * 100);
            
            // Ratio despesas/receita (ideal 0.85-0.95)
            let notaRatio = 0;
            if (ratioDespRec >= 0.85 && ratioDespRec <= 0.95) {
                notaRatio = 30;
            } else if (ratioDespRec < 0.85) {
                notaRatio = Math.max(0, 30 - (0.85 - ratioDespRec) * 50);
            } else {
                notaRatio = Math.max(0, 30 - (ratioDespRec - 0.95) * 100);
            }
            
            // Ratio folha (ideal < 50%)
            let notaFolha = 0;
            if (ratioFolha <= 0.40) {
                notaFolha = 25;
            } else if (ratioFolha <= 0.50) {
                notaFolha = 25 - (ratioFolha - 0.40) * 100;
            } else {
                notaFolha = Math.max(0, 15 - (ratioFolha - 0.50) * 50);
            }
            
            // Comissionados (ideal < 10%)
            let notaComiss = Math.max(0, 15 - ratioComissionados * 150);
            
            // Superavit (ideal > 0)
            let notaSuperavit = 0;
            if (superavit > 0.05) {
                notaSuperavit = 20;
            } else if (superavit > 0) {
                notaSuperavit = 10 + superavit * 200;
            } else {
                notaSuperavit = Math.max(0, 10 + superavit * 50);
            }
            
            // Reserva de emergência
            let notaReserva = Math.min(10, reserva * 2);
            
            return Math.round(notaRatio + notaFolha + notaComiss + notaSuperavit + notaReserva);
        }

        function calcularNotaGeral(indicadores) {
            let nota = 0;
            for (let area in PESOS) {
                nota += indicadores[area] * PESOS[area];
            }
            return Math.round(nota * 10) / 10;
        }

        function identificarDeficiencias(indicadores) {
            const deficiencias = [];
            
            for (let area in indicadores) {
                const indice = indicadores[area];
                // thresholds MUITO rígidos
                if (indice < 70) {
                    deficiencias.push({
                        area: area,
                        indice: indice,
                        prioridade: 'alta',
                        acao: ACOES_RECOMENDADAS[area]
                    });
                } else if (indice < 85) {
                    deficiencias.push({
                        area: area,
                        indice: indice,
                        prioridade: 'media',
                        acao: ACOES_RECOMENDADAS[area]
                    });
                }
            }
            
            return deficiencias.sort((a, b) => a.indice - b.indice);
        }

        function getClassificacao(nota) {
            // Classificação MUITO rígida
            if (nota >= 90) return { texto: 'EXCELENTE', classe: 'excelente' };
            if (nota >= 80) return { texto: 'BOA', classe: 'boa' };
            if (nota >= 60) return { texto: 'REGULAR', classe: 'regular' };
            return { texto: 'DEFICITÁRIA', classe: 'deficitaria' };
        }

        function getCorBarra(indice) {
            // Thresholds MUITO rígidos
            if (indice >= 85) return 'alta';
            if (indice >= 70) return 'media';
            return 'baixa';
        }

        async function analisarCidade() {
            const input = document.getElementById('cidadeInput');
            let cidade = input.value.trim();
            
            // Se vazio, usar nome padrão para teste
            if (!cidade) {
                cidade = "São Paulo";
                input.value = cidade;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('analisarBtn').disabled = true;
            
            // Simular busca na web (em produção, faria requisição a API real)
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            try {
                const dados = gerarDadosCidade(cidade);
                const indicadores = calcularIndicadores(dados);
                const notaGeral = calcularNotaGeral(indicadores);
                const deficiencias = identificarDeficiencias(indicadores);
                const classificacao = getClassificacao(notaGeral);
                
                exibirResultados(cidade, dados, indicadores, notaGeral, deficiencias, classificacao);
            } catch (e) {
                document.getElementById('results').innerHTML = `
                    <div class="erro">
                        <h3>Erro ao analisar</h3>
                        <p>${e.message}</p>
                    </div>
                `;
                document.getElementById('results').style.display = 'block';
            }
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('analisarBtn').disabled = false;
        }

        function exibirResultados(cidade, dados, indicadores, notaGeral, deficiencias, classificacao) {
            const html = `
                <div class="municipio-header">
                    <h2>🏙️ ${cidade}</h2>
                    <p>População: ${dados.poblacao.toLocaleString()} habitantes</p>
                    <div class="nota-geral">${notaGeral}/100</div>
                    <span class="classificacao ${classificacao.classe}">${classificacao.texto}</span>
                </div>
                
                <h3 style="margin-bottom: 20px;">📊 Indicadores por Área</h3>
                <div class="indicadores-grid">
                    ${Object.entries(indicadores).map(([area, indice]) => `
                        <div class="indicador-card">
                            <h3>
                                ${NOMES_AREAS[area]}
                                <span class="valor">${indice}</span>
                            </h3>
                            <div class="barra-container">
                                <div class="barra ${getCorBarra(indice)}" style="width: ${indice}%"></div>
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                ${deficiencias.length > 0 ? `
                    <div class="deficiencias">
                        <h3>⚠️ Áreas que precisam de atenção</h3>
                        ${deficiencias.map((d, i) => `
                            <div class="deficiencia-item">
                                <div class="area">
                                    ${i + 1}. ${NOMES_AREAS[d.area]}
                                    <span class="prioridade ${d.prioridade}">${d.prioridade.toUpperCase()}</span>
                                </div>
                                <div class="indice">Índice: ${d.indice}/100</div>
                                <div class="acao">💡 ${d.acao}</div>
                            </div>
                        `).join('')}
                    </div>
                ` : '<div class="deficiencias"><h3>✅ Todas as áreas com índices satisfatórios!</h3></div>'}
                
                <div class="fontes">
                    <strong>📌 Fontes de dados:</strong><br>
                    • Portal de Transparência Municipal<br>
                    • Dados do IBGE (população)<br>
                    • Lei de Responsabilidade Fiscal<br>
                    • TCM/TCU (Tribunais de Contas)
                </div>
            `;
            
            document.getElementById('results').innerHTML = html;
            document.getElementById('results').style.display = 'block';
        }

        // Permitir Enter para buscar
        document.getElementById('cidadeInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analisarCidade();
            }
        });
    </script>
